name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/bio-compass/pkb-service
  SERVICE_NAME: pkb-service
  HELM_CHART: ${{ vars.PKB_SERVICE_HELM_CHART || 'oci://ghcr.io/bio-compass/charts/pkb-service' }}
  HELM_CHART_VERSION: ${{ vars.PKB_SERVICE_HELM_CHART_VERSION || '' }}
  HELM_VERSION: ${{ vars.HELM_VERSION || 'v3.19.2' }}
  HELM_DIFF_VERSION: ${{ vars.HELM_DIFF_VERSION || 'v3.13.2' }}

jobs:
  test:
    name: Gradle Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew test --no-daemon

  publish-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image
        run: |
          image_tag="$(./gradlew -q printContainerImageTag)"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        run: ./gradlew jib --no-daemon -PcontainerImage="${IMAGE_NAME}"

  plan-deploy:
    name: Plan Kubernetes Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    permissions:
      contents: read
      packages: read
    outputs:
      requires-approval: ${{ steps.classify.outputs.requires-approval }}
      image-only: ${{ steps.classify.outputs.image-only }}
    env:
      IMAGE_TAG: ${{ needs.publish-image.outputs.image-tag }}
      K8S_NAMESPACE: bio-compass
      KUBECONFIG: /home/runner/.kube/biocompass.yaml

    steps:
      - name: Validate deployment secrets
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.BIO_COMPASS_HELM_TOKEN || secrets.GITHUB_TOKEN }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "${HELM_REGISTRY_TOKEN}" ]; then
            echo "BIO_COMPASS_HELM_TOKEN or GITHUB_TOKEN is required to read the Helm chart from ${REGISTRY}." >&2
            exit 1
          fi

          if [ -z "${KUBE_CONFIG}" ] && [ -z "${KUBE_CONFIG_B64}" ]; then
            echo "KUBE_CONFIG or KUBE_CONFIG_B64 secret is required for deployment." >&2
            exit 1
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure Kubernetes credentials
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p "${HOME}/.kube"

          if [ -n "${KUBE_CONFIG}" ]; then
            printf '%s' "${KUBE_CONFIG}" > "${KUBECONFIG}"
          elif [ -n "${KUBE_CONFIG_B64}" ]; then
            printf '%s' "${KUBE_CONFIG_B64}" | base64 --decode > "${KUBECONFIG}"
          else
            echo "KUBE_CONFIG or KUBE_CONFIG_B64 secret is required for deployment." >&2
            exit 1
          fi

          cp "${KUBECONFIG}" "${HOME}/.kube/config"
          chmod 600 "${KUBECONFIG}" "${HOME}/.kube/config"

      - name: Log in to Helm registry
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.BIO_COMPASS_HELM_TOKEN || secrets.GITHUB_TOKEN }}
        run: printf '%s' "${HELM_REGISTRY_TOKEN}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Install Helm diff
        run: helm plugin install https://github.com/databus23/helm-diff --version "${HELM_DIFF_VERSION}"

      - name: Show Helm diff
        id: diff
        run: |
          chart_version_args=()
          if [ -n "${HELM_CHART_VERSION}" ]; then
            chart_version_args=(--version "${HELM_CHART_VERSION}")
          fi

          set +e
          helm diff upgrade "${SERVICE_NAME}" "${HELM_CHART}" \
            "${chart_version_args[@]}" \
            --install \
            --allow-unreleased \
            --detailed-exitcode \
            --no-color \
            --namespace "${K8S_NAMESPACE}" \
            --set image.repository="${IMAGE_NAME}" \
            --set-string image.tag="${IMAGE_TAG}" \
            > helm-diff.txt
          diff_status=$?
          set -e

          cat helm-diff.txt

          {
            echo "### Helm diff for ${SERVICE_NAME}"
            echo
            echo '```diff'
            head -c 60000 helm-diff.txt
            echo
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${diff_status}" -ne 0 ] && [ "${diff_status}" -ne 2 ]; then
            exit "${diff_status}"
          fi

          echo "status=${diff_status}" >> "${GITHUB_OUTPUT}"

      - name: Classify Helm diff
        id: classify
        run: |
          if [ "${{ steps.diff.outputs.status }}" = "0" ]; then
            echo "image-only=true" >> "${GITHUB_OUTPUT}"
            echo "requires-approval=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          grep -E '^[+-][^+-]' helm-diff.txt \
            | grep -Ev '^[+-][[:space:]]*image:[[:space:]]' \
            > non-image-diff.txt || true

          if [ -s non-image-diff.txt ]; then
            echo "image-only=false" >> "${GITHUB_OUTPUT}"
            echo "requires-approval=true" >> "${GITHUB_OUTPUT}"
            {
              echo "### Manual approval required"
              echo
              echo "The Helm diff includes changes beyond container image updates."
              echo
              echo '```diff'
              head -c 20000 non-image-diff.txt
              echo
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "image-only=true" >> "${GITHUB_OUTPUT}"
            echo "requires-approval=false" >> "${GITHUB_OUTPUT}"
          fi

  deploy-image-only:
    name: Deploy Image-Only Change
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - publish-image
      - plan-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan-deploy.outputs.requires-approval == 'false'
    environment: dev
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ${{ needs.publish-image.outputs.image-tag }}
      K8S_NAMESPACE: bio-compass
      KUBECONFIG: /home/runner/.kube/biocompass.yaml

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure Kubernetes credentials
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p "${HOME}/.kube"

          if [ -n "${KUBE_CONFIG}" ]; then
            printf '%s' "${KUBE_CONFIG}" > "${KUBECONFIG}"
          elif [ -n "${KUBE_CONFIG_B64}" ]; then
            printf '%s' "${KUBE_CONFIG_B64}" | base64 --decode > "${KUBECONFIG}"
          else
            echo "KUBE_CONFIG or KUBE_CONFIG_B64 secret is required for deployment." >&2
            exit 1
          fi

          cp "${KUBECONFIG}" "${HOME}/.kube/config"
          chmod 600 "${KUBECONFIG}" "${HOME}/.kube/config"

      - name: Log in to Helm registry
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.BIO_COMPASS_HELM_TOKEN || secrets.GITHUB_TOKEN }}
        run: printf '%s' "${HELM_REGISTRY_TOKEN}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Deploy service
        run: |
          chart_version_args=()
          if [ -n "${HELM_CHART_VERSION}" ]; then
            chart_version_args=(--version "${HELM_CHART_VERSION}")
          fi

          helm upgrade --install "${SERVICE_NAME}" "${HELM_CHART}" \
            "${chart_version_args[@]}" \
            --namespace "${K8S_NAMESPACE}" \
            --create-namespace \
            --set image.repository="${IMAGE_NAME}" \
            --set-string image.tag="${IMAGE_TAG}"

      - name: Wait for rollout
        run: kubectl rollout status "deployment/${SERVICE_NAME}" --namespace "${K8S_NAMESPACE}" --timeout=180s

  approve-non-image-deploy:
    name: Approve Non-Image Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: plan-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan-deploy.outputs.requires-approval == 'true'
    environment: dev-manual-approval
    permissions:
      contents: read

    steps:
      - name: Await manual approval
        run: echo "Manual approval completed for non-image Helm diff."

  deploy-approved-change:
    name: Deploy Approved Change
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - publish-image
      - plan-deploy
      - approve-non-image-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan-deploy.outputs.requires-approval == 'true'
    environment: dev
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_TAG: ${{ needs.publish-image.outputs.image-tag }}
      K8S_NAMESPACE: bio-compass
      KUBECONFIG: /home/runner/.kube/biocompass.yaml

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Configure Kubernetes credentials
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p "${HOME}/.kube"

          if [ -n "${KUBE_CONFIG}" ]; then
            printf '%s' "${KUBE_CONFIG}" > "${KUBECONFIG}"
          elif [ -n "${KUBE_CONFIG_B64}" ]; then
            printf '%s' "${KUBE_CONFIG_B64}" | base64 --decode > "${KUBECONFIG}"
          else
            echo "KUBE_CONFIG or KUBE_CONFIG_B64 secret is required for deployment." >&2
            exit 1
          fi

          cp "${KUBECONFIG}" "${HOME}/.kube/config"
          chmod 600 "${KUBECONFIG}" "${HOME}/.kube/config"

      - name: Log in to Helm registry
        env:
          HELM_REGISTRY_TOKEN: ${{ secrets.BIO_COMPASS_HELM_TOKEN || secrets.GITHUB_TOKEN }}
        run: printf '%s' "${HELM_REGISTRY_TOKEN}" | helm registry login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Deploy service
        run: |
          chart_version_args=()
          if [ -n "${HELM_CHART_VERSION}" ]; then
            chart_version_args=(--version "${HELM_CHART_VERSION}")
          fi

          helm upgrade --install "${SERVICE_NAME}" "${HELM_CHART}" \
            "${chart_version_args[@]}" \
            --namespace "${K8S_NAMESPACE}" \
            --create-namespace \
            --set image.repository="${IMAGE_NAME}" \
            --set-string image.tag="${IMAGE_TAG}"

      - name: Wait for rollout
        run: kubectl rollout status "deployment/${SERVICE_NAME}" --namespace "${K8S_NAMESPACE}" --timeout=180s
