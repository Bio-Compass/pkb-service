name: ${COMPOSE_PROJECT_NAME:-pkb-service-local}

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    environment:
      POSTGRES_DB: ${PKB_POSTGRES_DB:-pkb}
      POSTGRES_USER: ${PKB_POSTGRES_USER:-pkb}
      POSTGRES_PASSWORD: ${PKB_POSTGRES_PASSWORD:-pkb-local-password}
    ports:
      - "${PKB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:4.0.2
    hostname: kafka
    environment:
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${PKB_KAFKA_PORT:-9092},INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "${PKB_KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PKB_MINIO_ROOT_USER:-pkb-local-access}
      MINIO_ROOT_PASSWORD: ${PKB_MINIO_ROOT_PASSWORD:-pkb-local-secret}
    ports:
      - "${PKB_MINIO_API_PORT:-9000}:9000"
      - "${PKB_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  opa:
    image: openpolicyagent/opa:1.16.2
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=debug
      - /policies
    ports:
      - "${PKB_OPA_PORT:-8181}:8181"
    volumes:
      - ./infra/local/opa/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres-data:
  minio-data:
